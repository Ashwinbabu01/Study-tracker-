<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>IMUCET Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #04080f;
    --surface: #0b1120;
    --surface2: #0f1929;
    --border: #1a2540;
    --green: #10b981;
    --green-dim: #052e1c;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --muted: #4b5563;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; font-size: 13px; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: var(--display); font-size: 15px; font-weight: 800; color: var(--green); letter-spacing: -0.01em; }
  .header-date { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .days-left-num { font-family: var(--display); font-size: 26px; font-weight: 800; line-height: 1; }
  .days-left-label { font-size: 8px; color: var(--muted); text-align: right; margin-top: 2px; }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 11px 4px; font-size: 10px; font-family: var(--mono);
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  /* CONTENT */
  .content { padding: 14px; max-width: 480px; margin: 0 auto; padding-bottom: 30px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .card-title { font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }

  /* FORM */
  label.lbl { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; font-size: 12px; font-family: var(--mono);
    outline: none; width: 100%; transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--green); }
  textarea { resize: vertical; min-height: 56px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .field { margin-bottom: 10px; }

  /* PILL */
  .pill {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: var(--mono);
  }
  .pill.active { border-color: var(--green); background: var(--green-dim); color: var(--green); }

  /* STARS */
  .stars { display: flex; gap: 4px; }
  .star { font-size: 20px; cursor: pointer; color: var(--border); transition: color 0.1s; }
  .star.on { color: var(--yellow); }

  /* PROGRESS BAR */
  .bar-wrap { background: var(--border); border-radius: 4px; height: 7px; margin-top: 3px; }
  .bar-fill { height: 7px; border-radius: 4px; transition: width 0.4s; }

  /* SUBMIT */
  .submit-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    background: linear-gradient(135deg, #059669, #047857);
    color: #fff; font-size: 12px; font-family: var(--mono);
    border: none; cursor: pointer; letter-spacing: 0.08em;
    margin-top: 4px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(16,185,129,0.2);
  }
  .submit-btn:active { transform: scale(0.98); }

  /* SUCCESS BANNER */
  .success-banner {
    background: var(--green-dim); border: 1px solid #065f46;
    border-radius: 10px; padding: 10px; margin-bottom: 12px;
    font-size: 11px; color: #34d399; text-align: center;
  }

  /* STAT GRID */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
  .stat-val { font-family: var(--display); font-size: 20px; font-weight: 800; line-height: 1.1; }
  .stat-lbl { font-size: 8px; color: var(--muted); margin-top: 3px; letter-spacing: 0.06em; }

  /* DAY ROW */
  .day-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .day-row:last-child { border-bottom: none; }
  .day-badge {
    width: 38px; height: 38px; border-radius: 8px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 8px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted); flex-shrink: 0;
  }
  .day-badge.today { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .day-badge.logged { border-color: var(--blue); color: var(--blue); background: #0c1a2e; }
  .day-badge b { font-size: 14px; line-height: 1.1; }
  .day-info { flex: 1; margin-left: 10px; }
  .day-main { font-size: 11px; color: #cbd5e1; }
  .day-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .mini-stars { display: flex; gap: 2px; }
  .mini-star { font-size: 11px; color: var(--border); }
  .mini-star.on { color: var(--yellow); }

  /* SUBJECT BAR */
  .subj-row { margin-bottom: 10px; }
  .subj-top { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 3px; }

  /* WEAK POINTS */
  .weak-item { font-size: 11px; color: #fca5a5; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .weak-item:last-child { border-bottom: none; }

  /* SUBJECT BLOCK */
  .subj-block { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .subj-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .subj-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .subj-name { font-size: 12px; color: #cbd5e1; font-weight: 500; }

  .note { font-size: 9px; color: var(--muted); text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">IMUCET STUDY LOG</div>
    <div class="header-date" id="todayDate"></div>
  </div>
  <div style="text-align:right">
    <div class="days-left-num" id="daysLeft"></div>
    <div class="days-left-label">DAYS TO EXAM</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('log')" id="tab-log">📋 TODAY'S LOG</button>
  <button class="tab-btn" onclick="showTab('week')" id="tab-week">📊 WEEK REVIEW</button>
</div>

<!-- TODAY TAB -->
<div class="content" id="page-log">

  <div id="successBanner" class="success-banner" style="display:none">✅ LOG SUBMITTED — CHECK WEEK REVIEW</div>

  <!-- SUBJECTS -->
  <div class="card">
    <div class="card-title">📚 Subject Log</div>
    <div id="subjectsContainer"></div>

    <div class="field" style="margin-top:10px">
      <label class="lbl">Total Study Hours Today</label>
      <input type="number" id="totalHours" placeholder="e.g. 5.5" step="0.5" style="width:45%"/>
    </div>
  </div>

  <!-- MOCK TEST -->
  <div class="card">
    <div class="card-title">🎯 Mock Test (if done today)</div>
    <div class="row2">
      <div class="field">
        <label class="lbl">Score</label>
        <input type="number" id="mockScore" placeholder="e.g. 140"/>
      </div>
      <div class="field">
        <label class="lbl">Out of</label>
        <input type="number" id="mockTotal" placeholder="200" value="200"/>
      </div>
    </div>
  </div>

  <!-- DAILY REVIEW -->
  <div class="card">
    <div class="card-title">🔍 Daily Review</div>
    <div class="field">
      <label class="lbl">Weak Point / Confusion Today</label>
      <input type="text" id="weakPoint" placeholder="e.g. Integration formulas not clear"/>
    </div>
    <div class="field">
      <label class="lbl">Tomorrow's Priority Focus</label>
      <input type="text" id="tomorrowFocus" placeholder="e.g. Chemistry — Periodic Table"/>
    </div>
  </div>

  <!-- DISCIPLINE -->
  <div class="card">
    <div class="card-title">🧠 Discipline Check</div>
    <div class="field">
      <label class="lbl">Wake Time</label>
      <input type="time" id="wakeTime" style="width:50%"/>
    </div>
    <div class="field">
      <label class="lbl">Phone Control (1=Bad · 5=Perfect)</label>
      <div class="stars" id="phoneStars"></div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label class="lbl">Overall Day Rating</label>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="stars" id="dayStars"></div>
        <span style="font-size:10px;color:var(--muted)" id="dayRatingLabel"></span>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="submitLog()">✅ SUBMIT TODAY'S LOG</button>
</div>

<!-- WEEK TAB -->
<div class="content" id="page-week" style="display:none">

  <div class="stat-grid" id="statGrid"></div>

  <div class="card">
    <div class="card-title">📅 Day-by-Day</div>
    <div id="dayRows"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Subject Consistency</div>
    <div id="subjBars"></div>
  </div>

  <div class="card" id="weakCard" style="display:none">
    <div class="card-title">⚠️ Weak Points This Week</div>
    <div id="weakList"></div>
    <div class="note" style="margin-top:8px;color:#ef4444">Fix these before next week.</div>
  </div>

  <div class="note">Data stored on your device · Works offline</div>
</div>

<script>
const SUBJECTS = ["Physics","Chemistry","Mathematics","English","Aptitude/GK"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const EXAM_DATE = new Date("2026-05-24");
const STORAGE_KEY = "imucet_study_v1";
const TARGETS = { calories: 2400, protein: 120 };
const RATINGS = ["","Poor","Below Avg","Average","Good","Excellent"];

// ── State ──
let phoneRating = 0, dayRating = 0;
let subjDone = {}, subjUnderstood = {};
SUBJECTS.forEach(s => { subjDone[s] = false; subjUnderstood[s] = 0; });

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function loadLogs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}

function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

function getWeekDates() {
  const today = new Date();
  const day = today.getDay();
  return Array.from({length:7}, (_,i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - day + i);
    return d.toISOString().split("T")[0];
  });
}

// ── Init Header ──
function initHeader() {
  const today = new Date();
  document.getElementById("todayDate").textContent = today.toDateString().toUpperCase();
  const days = Math.ceil((EXAM_DATE - today) / 86400000);
  const el = document.getElementById("daysLeft");
  el.textContent = days;
  el.style.color = days <= 30 ? "#ef4444" : days <= 60 ? "#f59e0b" : "#10b981";
}

// ── Build Subjects ──
function buildSubjects() {
  const c = document.getElementById("subjectsContainer");
  c.innerHTML = "";
  SUBJECTS.forEach(subj => {
    const div = document.createElement("div");
    div.className = "subj-block";
    div.innerHTML = `
      <div class="subj-header">
        <span class="subj-name">${subj}</span>
        <span class="pill" id="pill-${subj}" onclick="toggleDone('${subj}')">PENDING</span>
      </div>
      <div class="row2" style="margin-bottom:8px">
        <div class="field" style="margin-bottom:0">
          <label class="lbl">Topic</label>
          <input type="text" id="topic-${subj}" placeholder="e.g. Trigonometry"/>
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="lbl">PYQs Solved</label>
          <input type="number" id="pyq-${subj}" placeholder="e.g. 15"/>
        </div>
      </div>
      <label class="lbl">Understanding (1–5)</label>
      <div class="stars" id="stars-${subj}"></div>
    `;
    c.appendChild(div);
    buildStars(`stars-${subj}`, v => { subjUnderstood[subj] = v; });
  });
}

function toggleDone(subj) {
  subjDone[subj] = !subjDone[subj];
  const pill = document.getElementById(`pill-${subj}`);
  pill.textContent = subjDone[subj] ? "✓ DONE" : "PENDING";
  pill.className = "pill" + (subjDone[subj] ? " active" : "");
}

// ── Stars ──
function buildStars(containerId, onChange) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  let val = 0;
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement("span");
    s.className = "star";
    s.textContent = "★";
    s.dataset.val = i;
    s.onclick = () => {
      val = i; onChange(i);
      c.querySelectorAll(".star").forEach(x => x.className = "star" + (parseInt(x.dataset.val) <= val ? " on" : ""));
    };
    c.appendChild(s);
  }
}

function initStars() {
  buildStars("phoneStars", v => { phoneRating = v; });
  buildStars("dayStars", v => {
    dayRating = v;
    document.getElementById("dayRatingLabel").textContent = RATINGS[v] || "";
  });
}

// ── Tabs ──
function showTab(tab) {
  document.getElementById("page-log").style.display = tab === "log" ? "block" : "none";
  document.getElementById("page-week").style.display = tab === "week" ? "block" : "none";
  document.getElementById("tab-log").className = "tab-btn" + (tab === "log" ? " active" : "");
  document.getElementById("tab-week").className = "tab-btn" + (tab === "week" ? " active" : "");
  if (tab === "week") buildWeek();
}

// ── Load Today into Form ──
function loadToday() {
  const logs = loadLogs();
  const key = getTodayKey();
  const log = logs[key];
  if (!log) return;

  if (log.submitted) document.getElementById("successBanner").style.display = "block";
  document.getElementById("totalHours").value = log.totalHours || "";
  document.getElementById("mockScore").value = log.mockScore || "";
  document.getElementById("mockTotal").value = log.mockTotal || "200";
  document.getElementById("weakPoint").value = log.weakPoint || "";
  document.getElementById("tomorrowFocus").value = log.tomorrowFocus || "";
  document.getElementById("wakeTime").value = log.wakeTime || "";

  SUBJECTS.forEach(subj => {
    if (log.subjects && log.subjects[subj]) {
      const s = log.subjects[subj];
      if (s.done) toggleDone(subj);
      document.getElementById(`topic-${subj}`).value = s.topic || "";
      document.getElementById(`pyq-${subj}`).value = s.pyq || "";
      if (s.understood) {
        subjUnderstood[subj] = s.understood;
        const c = document.getElementById(`stars-${subj}`);
        c.querySelectorAll(".star").forEach(x => x.className = "star" + (parseInt(x.dataset.val) <= s.understood ? " on" : ""));
      }
    }
  });
}

// ── Submit ──
function submitLog() {
  const logs = loadLogs();
  const key = getTodayKey();
  const subjects = {};
  SUBJECTS.forEach(subj => {
    subjects[subj] = {
      done: subjDone[subj],
      topic: document.getElementById(`topic-${subj}`).value,
      pyq: document.getElementById(`pyq-${subj}`).value,
      understood: subjUnderstood[subj]
    };
  });
  logs[key] = {
    subjects,
    totalHours: document.getElementById("totalHours").value,
    mockScore: document.getElementById("mockScore").value,
    mockTotal: document.getElementById("mockTotal").value,
    weakPoint: document.getElementById("weakPoint").value,
    tomorrowFocus: document.getElementById("tomorrowFocus").value,
    wakeTime: document.getElementById("wakeTime").value,
    phoneRating, dayRating,
    submitted: true
  };
  saveLogs(logs);
  document.getElementById("successBanner").style.display = "block";
  window.scrollTo({top:0,behavior:"smooth"});
  setTimeout(() => showTab("week"), 600);
}

// ── Week Review ──
function buildWeek() {
  const logs = loadLogs();
  const weekDates = getWeekDates();
  const todayKey = getTodayKey();
  const weekLogs = weekDates.map(d => logs[d] || null);
  const submitted = weekLogs.filter(l => l && l.submitted);

  // Stat grid
  const totalPYQ = submitted.reduce((a,l) => a + SUBJECTS.reduce((b,s) => b + (parseInt(l.subjects?.[s]?.pyq)||0),0),0);
  const avgHours = submitted.length ? (submitted.reduce((a,l)=>a+(parseFloat(l.totalHours)||0),0)/submitted.length).toFixed(1) : "—";
  const avgRating = submitted.length ? (submitted.reduce((a,l)=>a+(l.dayRating||0),0)/submitted.length).toFixed(1) : "—";
  const avgPhone = submitted.length ? (submitted.reduce((a,l)=>a+(l.phoneRating||0),0)/submitted.length).toFixed(1) : "—";
  const mocksDone = submitted.filter(l=>l.mockScore).length;
  const totalSubjDone = submitted.reduce((a,l)=>a+SUBJECTS.filter(s=>l.subjects?.[s]?.done).length,0);

  const stats = [
    ["Avg Hours/Day", avgHours+"h", "#10b981"],
    ["Days Logged", submitted.length+"/7", "#3b82f6"],
    ["Total PYQs", totalPYQ, "#f59e0b"],
    ["Phone Ctrl", avgPhone+"/5", "#a78bfa"],
    ["Subjects Done", totalSubjDone, "#f97316"],
    ["Mocks Done", mocksDone, "#ec4899"],
  ];
  document.getElementById("statGrid").innerHTML = stats.map(([lbl,val,color]) => `
    <div class="stat-card">
      <div class="stat-val" style="color:${color}">${val}</div>
      <div class="stat-lbl">${lbl}</div>
    </div>
  `).join("");

  // Day rows
  document.getElementById("dayRows").innerHTML = weekDates.map((date,i) => {
    const l = logs[date];
    const isToday = date === todayKey;
    const d = new Date(date);
    const doneSubjs = l?.submitted ? SUBJECTS.filter(s=>l.subjects?.[s]?.done) : [];
    const badgeClass = isToday ? "today" : l?.submitted ? "logged" : "";
    const starsHtml = l?.submitted ? [1,2,3,4,5].map(j=>`<span class="mini-star${j<=l.dayRating?' on':''}"">★</span>`).join("") : "";
    return `
      <div class="day-row">
        <div class="day-badge ${badgeClass}"><b>${d.getDate()}</b>${DAYS[d.getDay()]}</div>
        <div class="day-info">
          ${l?.submitted ? `
            <div class="day-main">${l.totalHours?l.totalHours+"h":"—"} · ${doneSubjs.length} subjects${l.mockScore?" · Mock: "+l.mockScore+"/"+l.mockTotal:""}</div>
            <div class="day-sub">${doneSubjs.join(", ")||"No subjects"}</div>
          ` : `<div class="day-main" style="color:var(--border)">${isToday?"Fill log →":"Not logged"}</div>`}
        </div>
        <div class="mini-stars">${starsHtml}</div>
      </div>
    `;
  }).join("");

  // Subject bars
  document.getElementById("subjBars").innerHTML = SUBJECTS.map(subj => {
    const count = submitted.filter(l=>l.subjects?.[subj]?.done).length;
    const pct = Math.round((count/7)*100);
    const color = pct>=80?"#10b981":pct>=50?"#f59e0b":"#ef4444";
    return `
      <div class="subj-row">
        <div class="subj-top"><span>${subj}</span><span style="color:${color}">${count}/7 days</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="background:${color};width:${pct}%"></div></div>
      </div>
    `;
  }).join("");

  // Weak points
  const weakItems = submitted.filter(l=>l.weakPoint);
  if (weakItems.length) {
    document.getElementById("weakCard").style.display = "block";
    document.getElementById("weakList").innerHTML = weakItems.map(l=>`<div class="weak-item">→ ${l.weakPoint}</div>`).join("");
  } else {
    document.getElementById("weakCard").style.display = "none";
  }
}

// ── Boot ──
initHeader();
buildSubjects();
initStars();
loadToday();
</script>
</body>
</html>
